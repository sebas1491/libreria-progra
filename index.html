<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyLib - Tu Biblioteca de Programación</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: #ffffff;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.4);
            border-color: #38bdf8;
        }

        .gradient-text {
            background: linear-gradient(90deg, #38bdf8, #818cf8, #fb7185);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Proporción de libro real (3:4) para que sean más largas */
        .book-cover-wrapper {
            width: 100%;
            aspect-ratio: 3 / 4;
            overflow: hidden;
            border-radius: 8px;
            margin-bottom: 0.75rem;
        }

        .book-cover {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .glass-card:hover .book-cover {
            transform: scale(1.05);
        }

        .category-badge {
            background: rgba(56, 189, 248, 0.12);
            color: #7dd3fc;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 600;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <!-- Encabezado -->
    <header class="max-w-5xl mx-auto text-center mb-8">
        <h1 class="text-3xl md:text-5xl font-bold mb-3 gradient-text">Biblioteca Digital</h1>
        <p class="text-slate-400 text-sm md:text-base max-w-xl mx-auto">
            Conceptos, Python y Javascript.
        </p>
    </header>

    <!-- Buscador -->
    <div class="max-w-md mx-auto mb-10">
        <input type="text" id="searchInput" placeholder="Buscar libro..." 
            class="w-full bg-slate-800/40 border border-slate-700 rounded-xl py-2 px-5 focus:outline-none focus:ring-2 focus:ring-sky-500 transition text-sm">
    </div>

    <!-- Rejilla de 5 Libros por fila -->
    <main class="max-w-7xl mx-auto grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6" id="bookGrid">
        
        <!-- Libro 1 -->
        <a href="https://drive.google.com/file/d/1yVBVKSb-bG4Sk-mPzLt00V4lr4GmcYHf/view?usp=sharing" target="_blank" class="glass-card rounded-xl p-3 flex flex-col">
            <div class="book-cover-wrapper shadow-lg">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRwxLsqSC13t4WkQLxJ4uzP811aalz7bHmYAg&s" alt="Estructuras de datos" class="book-cover">
            </div>
            <div class="flex-grow">
                <span class="category-badge mb-1 inline-block">Conceptos</span>
                <h3 class="text-sm font-bold leading-tight group-hover:text-sky-400 transition-colors">Estructuras de datos básicas</h3>
            </div>
        </a>

        <!-- Libro 2 -->
        <a href="https://drive.google.com/file/d/1-90tE3yHAxOZd5XxW0F-RYisejy4EZo3/view?usp=sharing" target="_blank" class="glass-card rounded-xl p-3 flex flex-col">
            <div class="book-cover-wrapper shadow-lg">
                <img src="https://hotmart.s3.amazonaws.com/product_pictures/6f410efe-ac2d-4027-9524-e9704063fbde/Capturadepantalla20251212171650.png" alt="Javascript" class="book-cover">
            </div>
            <div class="flex-grow">
                <span class="category-badge mb-1 inline-block" style="color: #fde047;">Python</span>
                <h3 class="text-sm font-bold leading-tight">Aprenda a pensar como un programador con Python</h3>
            </div>
        </a>

        <!-- Libro 3 -->
        <a href="https://drive.google.com/file/d/1HNZCmvMq1VIljogRhjes-sMAEX8hSVGk/view?usp=sharing" target="_blank" class="glass-card rounded-xl p-3 flex flex-col">
            <div class="book-cover-wrapper shadow-lg">
                <img src="https://images.cdn1.buscalibre.com/fit-in/360x360/87/da/87da3d378f0336fd04014c4ea153d064.jpg" alt="Automatización" class="book-cover">
            </div>
            <div class="flex-grow">
                <span class="category-badge mb-1 inline-block">Conceptos</span>
                <h3 class="text-sm font-bold leading-tight">Codigo Limpio</h3>
            </div>
        </a>

        <!-- Libro 4 -->
        <a href="https://drive.google.com/file/d/1Ee4-wb-WHlUpJHDICW5ZoLu-TWPxbBwx/view?usp=sharing" target="_blank" class="glass-card rounded-xl p-3 flex flex-col">
            <div class="book-cover-wrapper shadow-lg">
                <img src="https://www.lawebdelprogramador.com/pdf/files/1498566884_apunte_7540.jpg" alt="Lógica" class="book-cover">
            </div>
            <div class="flex-grow">
                <span class="category-badge mb-1 inline-block">Python</span>
                <h3 class="text-sm font-bold leading-tight">Algoritmos y Programación I</h3>
            </div>
        </a>

        <!-- Libro 5 -->
        <a href="https://drive.google.com/file/d/1NQ5oZLPiTeJFDYRzDyAwZKuFvrAnXqel/view?usp=sharing" target="_blank" class="glass-card rounded-xl p-3 flex flex-col">
            <div class="book-cover-wrapper shadow-lg">
                <img src="https://editorial.uader.edu.ar/sites/default/files/imagenes-sitio/colecciones/amalgama/algoritmos-y-estructuras-de-datos-en-phyton/cover-algoritmos.jpg" alt="Web Dev" class="book-cover">
            </div>
            <div class="flex-grow">
                <span class="category-badge mb-1 inline-block">Python</span>
                <h3 class="text-sm font-bold leading-tight">Algoritmos y estructuras de datos en Python</h3>
            </div>
        </a>

    </main>

    <footer class="mt-20 text-center text-slate-600 text-[10px] uppercase tracking-widest border-t border-slate-800 pt-8">
        <p>PyLib — Material Académico</p>
    </footer>

    <script>
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            const cards = document.querySelectorAll('#bookGrid > a');
            
            cards.forEach(card => {
                const title = card.querySelector('h3').innerText.toLowerCase();
                const badge = card.querySelector('.category-badge').innerText.toLowerCase();
                if(title.includes(term) || badge.includes(term)) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
